<!DOCTYPE html>
<html>
<head>
  <title>ckúc mừg sinh nhật ck</title>
</head>

<body style="
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-family:sans-serif;
">

  <div>
    <h2>chồng iu biết mật khẩu chưaaa nhập dô i nềee 🎁</h2>

    <input type="password" id="pw" 
      style="padding:10px; border-radius:10px; border:1px solid #ccc;">
    
    <br><br>

    <button onclick="check()" 
      style="padding:10px 20px; border-radius:10px; border:none;">
      ok r đấy e iu
    </button>

    <p id="msg" style="margin-top:15px;"></p>
  </div>

  <script>
    let attempts = 0;

    function check() {
      var password = document.getElementById("pw").value;
      var msg = document.getElementById("msg");
      var input = document.getElementById("pw");

      if(password === "minhthienthongminhdeptraichimtonhat") {
        window.location.href = "secret.html";
      } else {
        attempts++;

        if(attempts === 1) {
          msg.innerText = "sai ồi :< thử lại i cưng";
        } 
        else if(attempts === 2) {
          msg.innerText = "hint: điều hiển nhiên (minhthienth_ _ _mi_ _d_ _t_ _ _c_ _ _ _t_ nhat) (mỗi gạch là một chữ cần điền)";
        } 
        else if(attempts === 3) {
          msg.innerText = "anh thử type chậm lại xem xao huhu";
        } 
        else if(attempts === 4) {
          msg.innerText = "nó là minhthienthongminhdeptraic_ _ _ _t_nhat đó, anh đoán coi là gì !! (hint tiếp luôn 3=================D lmao)";
        } 
        else if(attempts === 5) {
          msg.innerText = "anh type j mầ sai được dzay lmao 😭 anh thử type chậm lại xem xao huhu";
        }
        else {
          msg.innerText = "anh cố tình phải hong !!! phạt đợi 5s";
          input.disabled = true;

          setTimeout(() => {
            attempts = 0;
            input.disabled = false;
            input.value = "";
            msg.innerText = "";
          }, 5000);
        }
      }
    }
  </script>

</body>
</html>
